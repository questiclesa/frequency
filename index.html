<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#181c20;
    --surface:#21262d;
    --surface-2:#2a313a;
    --border:#384049;
    --text:#ece9e2;
    --text-dim:#8b929b;
    --amber:#ff9d45;
    --teal:#4fc1b8;
    --danger:#e2614d;
    --font-display:'Big Shoulders Display',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);height:100vh;overflow:hidden;}
  button,input,textarea{font-family:inherit;}
  button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

  #app{height:100vh;display:flex;flex-direction:column;}

  /* ---------- Auth ---------- */
  .onboard-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%, #232a32 0%, var(--bg) 60%);padding:24px;overflow-y:auto;}
  .onboard-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .onboard-icon{color:var(--amber);margin-bottom:14px;}
  .onboard-card h1{font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:.02em;margin:0 0 6px;}
  .onboard-card p{color:var(--text-dim);font-size:14px;line-height:1.5;margin:0 0 20px;}
  .onboard-card input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:15px;margin-bottom:12px;}
  .onboard-card button.primary-submit{width:100%;background:var(--amber);color:#1a1408;border:none;border-radius:8px;font-weight:700;font-family:var(--font-mono);letter-spacing:.04em;font-size:13px;padding:12px 0;cursor:pointer;transition:filter .15s;}
  .onboard-card button.primary-submit:hover{filter:brightness(1.08);}
  .onboard-note{font-size:12px;color:var(--text-dim);margin-top:14px;line-height:1.5;}
  .auth-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .auth-tab{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);padding:9px 0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font-mono);letter-spacing:.03em;}
  .auth-tab.active{background:var(--amber);color:#1a1408;border-color:var(--amber);}
  .auth-error{color:var(--danger);font-size:12px;min-height:16px;margin:-2px 0 10px;line-height:1.4;}

  /* ---------- Topbar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.03em;color:var(--text);}
  .brand svg{color:var(--amber);}

  .tab-switch{position:relative;display:flex;background:var(--surface-2);border-radius:999px;padding:4px;gap:4px;}
  .tab-switch button{position:relative;z-index:1;width:100px;text-align:center;border:none;background:transparent;color:var(--text-dim);font-family:var(--font-mono);font-weight:600;font-size:11px;letter-spacing:.06em;padding:9px 0;border-radius:999px;cursor:pointer;transition:color .25s;}
  .tab-switch button.active{color:#15181b;}
  .tab-indicator{position:absolute;top:4px;left:4px;height:calc(100% - 8px);width:100px;background:var(--amber);border-radius:999px;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 0 16px rgba(255,157,69,.45);}
  .tab-indicator.pos1{transform:translateX(104px);}
  .tab-indicator.pos2{transform:translateX(208px);}
  .tab-pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-left:5px;animation:pulse 1.6s infinite;vertical-align:middle;}

  .who{display:flex;align-items:center;gap:16px;}
  .online-count{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;animation:pulse 1.8s infinite;}
  .profile-pill{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 5px;cursor:pointer;color:var(--text);font-size:13px;}
  .avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:11px;color:#15181b;flex-shrink:0;}

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .role-tag{display:inline-flex;align-items:center;margin-left:6px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.1em;color:#fff;border:1px solid transparent;border-radius:4px;padding:2px 6px;vertical-align:middle;}
  .role-tag.lg{font-size:11px;padding:3px 9px;margin-left:10px;}
  .role-tag.role-admin{background:var(--danger);border-color:#f08a76;animation:adminPulse 1.4s ease-in-out infinite;}
  .role-tag.role-dev{background:#5cc8ff;border-color:#a9e4ff;color:#04161f;animation:devPulse 1.4s ease-in-out infinite;}
  .role-tag.role-mod{background:#3b6fd4;border-color:#6f9bf0;}
  .role-tag.role-vip{background:var(--amber);border-color:#ffc488;color:#1a1408;}
  @keyframes adminPulse{0%,100%{box-shadow:0 0 0 0 rgba(226,97,77,.55);opacity:1;}50%{box-shadow:0 0 11px 2px rgba(226,97,77,.75);opacity:.72;}}
  @keyframes devPulse{0%,100%{box-shadow:0 0 0 0 rgba(92,200,255,.55);opacity:1;}50%{box-shadow:0 0 11px 2px rgba(92,200,255,.75);opacity:.72;}}

  /* ---------- Console ---------- */
  .console-btn{background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:8px;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.06em;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .console-btn:hover{background:rgba(226,97,77,.12);}
  .console-overlay{position:fixed;inset:0;background:rgba(8,10,12,.72);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:32px 24px;overflow-y:auto;}
  .console-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:680px;box-shadow:0 24px 70px rgba(0,0,0,.5);}
  .console-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
  .console-head h2{font-family:var(--font-display);font-size:24px;font-weight:700;margin:0;display:flex;align-items:center;gap:9px;}
  .console-head h2 svg{color:var(--danger);}
  .console-close{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;line-height:1;padding:4px 8px;}
  .console-close:hover{color:var(--text);}
  .console-body{padding:14px 24px 24px;}
  .console-search{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:14px;}
  .user-row{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .user-row.is-banned{border-color:var(--danger);}
  .user-row-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .user-row-top .uname{font-weight:600;font-size:14px;}
  .user-status{font-family:var(--font-mono);font-size:11px;margin-left:auto;}
  .user-status.banned{color:var(--danger);}
  .user-status.timed{color:var(--amber);}
  .user-status.active{color:var(--teal);}
  .ctl-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--text-dim);margin:12px 0 6px;}
  .ctl-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);border-radius:999px;padding:6px 12px;font-size:12px;font-family:var(--font-mono);cursor:pointer;letter-spacing:.04em;}
  .chip:hover{border-color:var(--text-dim);color:var(--text);}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#0e1f1d;font-weight:600;}
  .chip.on.role-admin-chip{background:var(--danger);border-color:var(--danger);color:#fff;}
  .chip.on.role-dev-chip{background:#5cc8ff;border-color:#5cc8ff;color:#04161f;}
  .chip.danger{border-color:var(--danger);color:var(--danger);}
  .chip.danger:hover{background:rgba(226,97,77,.12);}
  .chip.disabled{opacity:.4;cursor:not-allowed;}
  .self-note{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}

  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}

  main{flex:1;overflow:hidden;}

  .link-name{background:none;border:none;padding:0;margin:0;font:inherit;color:inherit;cursor:pointer;}
  .link-name:hover{text-decoration:underline;}

  /* ---------- Board ---------- */
  .board-layout{display:grid;grid-template-columns:230px 1fr;height:100%;}
  .channel-rail{border-right:1px solid var(--border);padding:20px 14px;overflow-y:auto;}
  .rail-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--text-dim);margin:0 8px 10px;}
  .channel-item{display:block;width:100%;text-align:left;background:transparent;border:none;border-left:2px solid transparent;color:var(--text-dim);padding:9px 10px;border-radius:6px;cursor:pointer;font-size:14px;margin-bottom:2px;}
  .channel-item:hover{background:var(--surface-2);color:var(--text);}
  .channel-item.active{background:var(--surface-2);color:var(--text);border-left-color:var(--teal);font-weight:600;}
  .channel-desc{display:block;font-size:11px;color:var(--text-dim);font-weight:400;margin-top:2px;}
  .ghost-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text-dim);border-radius:8px;padding:9px 0;font-size:13px;cursor:pointer;margin-top:8px;}
  .ghost-btn:hover{border-color:var(--amber);color:var(--amber);}

  .board-main{padding:28px 36px;overflow-y:auto;height:100%;}
  .board-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .board-header h2{font-family:var(--font-display);font-size:28px;font-weight:700;margin:0 0 4px;}
  .board-header p{color:var(--text-dim);font-size:14px;margin:0;}
  .primary-btn{background:var(--amber);color:#1a1408;border:none;border-radius:8px;font-weight:700;font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;padding:11px 18px;cursor:pointer;white-space:nowrap;}
  .primary-btn:hover{filter:brightness(1.08);}
  .secondary-btn{background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;font-size:13px;padding:9px 14px;cursor:pointer;}
  .secondary-btn:hover{color:var(--text);border-color:var(--text-dim);}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px;}
  .panel input,.panel textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:10px;resize:vertical;}
  .panel-actions{display:flex;gap:10px;justify-content:flex-end;}

  .thread-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
  .thread-card:hover{border-color:var(--teal);}
  .thread-card h3{font-family:var(--font-display);font-size:18px;font-weight:600;margin:0 0 6px;}
  .thread-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

  .empty-state{border:1px dashed var(--border);border-radius:12px;padding:36px 20px;text-align:center;color:var(--text-dim);}
  .empty-state p{margin:0 0 14px;font-size:14px;}

  .back-link{background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:0;margin-bottom:18px;}
  .back-link:hover{color:var(--amber);}
  .thread-title{font-family:var(--font-display);font-size:26px;font-weight:700;margin:0 0 16px;}

  .post-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
  .post-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .post-name{font-weight:600;font-size:13px;}
  .post-time{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
  .post-body{font-size:14px;line-height:1.6;white-space:pre-wrap;}
  .reply-count-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-dim);margin:18px 0 10px;}

  /* ---------- Live chat ---------- */
  .live-layout{display:grid;grid-template-rows:1fr auto;height:100%;}
  .chat-stream{padding:24px 36px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .chat-msg{display:flex;gap:10px;align-items:flex-start;}
  .chat-msg .avatar{width:30px;height:30px;font-size:12px;margin-top:2px;}
  .chat-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:2px;}
  .chat-meta b{color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:600;margin-right:6px;}
  .chat-text{font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .chat-input-bar{border-top:1px solid var(--border);padding:16px 36px;display:flex;gap:12px;background:var(--surface);}
  .chat-input-bar input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:11px 18px;font-size:14px;}
  .chat-input-bar button{background:var(--teal);color:#0e1f1d;border:none;border-radius:999px;padding:0 22px;font-weight:700;font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;cursor:pointer;}
  .chat-input-bar button:hover{filter:brightness(1.08);}

  /* ---------- People / Profile ---------- */
  .people-page{padding:28px 36px;overflow-y:auto;height:100%;max-width:640px;margin:0 auto;}
  .people-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
  .people-row:hover{border-color:var(--teal);}
  .people-row .meta{flex:1;}
  .people-row .pname{font-weight:600;font-size:14px;}
  .people-row .pfollowers{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-top:2px;}

  .profile-page{padding:28px 36px;overflow-y:auto;height:100%;max-width:640px;margin:0 auto;}
  .profile-top{display:flex;gap:18px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  .avatar-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:24px;color:#15181b;flex-shrink:0;}
  .profile-name{font-family:var(--font-display);font-size:30px;font-weight:700;margin:0;}
  .profile-handle{font-family:var(--font-mono);font-size:13px;color:var(--text-dim);margin-top:2px;}
  .profile-joined{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-top:4px;}
  .profile-stats{display:flex;gap:26px;margin:18px 0 22px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);flex-wrap:wrap;}
  .profile-stats b{display:block;font-family:var(--font-display);font-size:22px;color:var(--text);font-weight:700;}
  .profile-actions{display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap;align-items:center;}
  .follow-btn{background:var(--teal);color:#0e1f1d;border:none;border-radius:999px;font-weight:700;font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;padding:10px 20px;cursor:pointer;}
  .follow-btn.following{background:transparent;border:1px solid var(--border);color:var(--text);}
  .like-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:999px;padding:10px 18px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .like-btn.liked{border-color:var(--amber);color:var(--amber);}
  .you-badge{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);border:1px solid var(--border);border-radius:999px;padding:8px 14px;}

  /* ---------- Modal ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(10,12,14,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .modal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;max-width:340px;width:100%;}
  .modal-card h3{font-family:var(--font-display);font-size:20px;margin:0 0 14px;}
  .modal-card input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:14px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}

  @media (max-width:760px){
    .board-layout{grid-template-columns:1fr;}
    .channel-rail{display:flex;gap:8px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border);padding:14px;white-space:nowrap;}
    .channel-item{width:auto;}
    .rail-label{display:none;}
    .ghost-btn{width:auto;padding:9px 14px;margin-top:0;}
    .board-main,.chat-stream,.chat-input-bar,.people-page,.profile-page{padding-left:18px;padding-right:18px;}
    .topbar{padding:12px 16px;}
    .tab-switch button{width:84px;font-size:10px;}
    .tab-indicator{width:84px;}
    .tab-indicator.pos1{transform:translateX(88px);}
    .tab-indicator.pos2{transform:translateX(176px);}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   CONFIG — paste your Supabase project values here.
   Project Settings → API → "Project URL" and "anon public" key.
   ========================================================================= */
const SUPABASE_URL = 'https://sqipcioraquvwofymrpa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxaXBjaW9yYXF1dndvZnltcnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTA0NzAsImV4cCI6MjA5NzU2NjQ3MH0.mrIcs8Q7cB58p6N8twuj2j5_-1krl7kA_C9rzHRyVx4';
/* ========================================================================= */

const CONFIGURED = SUPABASE_URL.startsWith('http') && SUPABASE_ANON_KEY.length > 20
  && typeof window.supabase !== 'undefined';
const sb = CONFIGURED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ================= Utilities ================= */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const PALETTE = ['#ff9d45','#4fc1b8','#e2614d','#8aa9ff','#d9c24f','#c893e0'];
function randColor(){ return PALETTE[Math.floor(Math.random()*PALETTE.length)]; }
function initials(name){ return ((name||'?').trim()[0] || '?').toUpperCase(); }
function slugify(s){ return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'channel'; }
function relTime(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 5) return 'just now';
  if (s < 60) return s+'s ago';
  const m = Math.floor(s/60); if (m < 60) return m+'m ago';
  const h = Math.floor(m/60); if (h < 24) return h+'h ago';
  const d = Math.floor(h/24); return d+'d ago';
}
function fmtDate(ts){ return new Date(ts).toLocaleDateString(undefined,{month:'short', year:'numeric'}); }
function fmtRemaining(ms){ const m = Math.ceil(ms/60000); if (m<60) return m+'m'; const h=Math.floor(m/60), r=m%60; return r?h+'h '+r+'m':h+'h'; }
function signalIcon(size){ return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><path d="M8.5 14.5a5 5 0 0 1 7 0"/><path d="M5 11a9.9 9.9 0 0 1 14 0"/></svg>`; }
function shieldIcon(size){ return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/></svg>`; }

const ROLE_DEFS = [ {id:'developer',label:'DEV'}, {id:'admin',label:'ADMIN'}, {id:'mod',label:'MOD'}, {id:'vip',label:'VIP'} ];
function getUserRoles(userId){ const p = state.directory[userId]; return (p && Array.isArray(p.roles)) ? p.roles : []; }
function isAdminUser(userId){ return getUserRoles(userId).includes('admin'); }
function isDeveloperUser(userId){ return getUserRoles(userId).includes('developer'); }
function roleTags(userId, large){
  return ROLE_DEFS.filter(r => getUserRoles(userId).includes(r.id))
    .map(r => `<span class="role-tag role-${r.id}${large?' lg':''}">${r.label}</span>`).join('');
}
function nameOf(id){ const p = state.directory[id]; return p ? p.name : 'Unknown'; }
function colorOf(id){ const p = state.directory[id]; return p ? p.color : '#888'; }
function authorLink(authorId, extraOnclick){
  return `<span class="link-name" style="color:${colorOf(authorId)}" onclick="${extraOnclick||''}openProfile('${authorId}')">${esc(nameOf(authorId))}</span>${roleTags(authorId)}`;
}

/* ================= State ================= */
const state = {
  me: null, tab:'board', channels:[], activeChannel:'general',
  threads:[], view:'list', openThreadId:null, posts:[], chat:[],
  directory:{}, follows:{}, likes:{}, profileView:null,
  showNewThread:false, showNewChannel:false, heartbeatHandle:null,
};
let pollHandle = null, consolePoll = null;
function clearPoll(){ if(pollHandle){ clearInterval(pollHandle); pollHandle=null; } }
function setPoll(fn, ms){ clearPoll(); pollHandle = setInterval(fn, ms); }
const app = document.getElementById('app');

/* ================= Profile mapping ================= */
function mapProfile(r){
  return {
    id:r.id, username:r.username, name:r.name||r.username, color:r.color||'#888',
    roles: Array.isArray(r.roles)?r.roles:[], banned: !!r.banned,
    timeoutUntil: r.timeout_until ? new Date(r.timeout_until).getTime() : 0,
    joinedAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()
  };
}

/* ================= Boot / config ================= */
async function boot(){
  if (!CONFIGURED){ renderConfigScreen(); return; }
  const { data:{ session } } = await sb.auth.getSession();
  if (session && session.user){
    const ok = await loadMe(session.user.id, session.user);
    if (ok){ await afterAuth(); return; }
  }
  renderAuth('login');
}

async function loadMe(userId){
  const { data, error } = await sb.from('profiles').select('*').eq('id', userId).maybeSingle();
  if (error || !data) return false;
  state.me = mapProfile(data);
  state.directory[state.me.id] = state.me;
  return true;
}

function renderConfigScreen(){
  app.innerHTML = `
    <div class="onboard-wrap">
      <div class="onboard-card">
        <div class="onboard-icon">${signalIcon(28)}</div>
        <h1>Frequency</h1>
        <p>This build runs on Supabase. Before it works, open <b>index.html</b> in a text editor and paste your project's URL and anon key into the CONFIG block at the top of the script, then re-upload.</p>
        <div class="onboard-note">You'll find both values in your Supabase dashboard under <b>Project Settings → API</b>. The full setup steps were included with this file.</div>
      </div>
    </div>`;
}

/* ================= Auth screens ================= */
function renderAuth(mode){
  app.innerHTML = `
    <div class="onboard-wrap">
      <div class="onboard-card">
        <div class="onboard-icon">${signalIcon(28)}</div>
        <h1>Frequency</h1>
        <p>${mode==='signup' ? 'Create an account to join the board and live chat.' : 'Welcome back. Log in to continue.'}</p>
        <div class="auth-tabs">
          <button class="auth-tab ${mode==='login'?'active':''}" onclick="renderAuth('login')">Log in</button>
          <button class="auth-tab ${mode==='signup'?'active':''}" onclick="renderAuth('signup')">Sign up</button>
        </div>
        ${mode==='signup' ? `<input id="authUsername" placeholder="Username (shown to others)" maxlength="20" autocomplete="username">` : ''}
        <input id="authEmail" type="email" placeholder="Email" autocomplete="email">
        <input id="authPassword" type="password" placeholder="Password" autocomplete="${mode==='signup'?'new-password':'current-password'}">
        ${mode==='signup' ? `<input id="authConfirm" type="password" placeholder="Confirm password" autocomplete="new-password">` : ''}
        <div id="authError" class="auth-error"></div>
        <button class="primary-submit" id="authSubmit">${mode==='signup'?'Create account':'Log in'}</button>
        <div class="onboard-note">Your email is only used to sign in. Other members see your username, never your email.</div>
      </div>
    </div>`;
  const run = () => mode==='signup' ? submitSignup() : submitLogin();
  document.getElementById('authSubmit').addEventListener('click', run);
  app.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if(e.key==='Enter') run(); }));
  (document.getElementById('authUsername') || document.getElementById('authEmail')).focus();
}

async function submitSignup(){
  const username = (document.getElementById('authUsername').value||'').trim();
  const email = (document.getElementById('authEmail').value||'').trim();
  const password = document.getElementById('authPassword').value||'';
  const confirm = document.getElementById('authConfirm').value||'';
  const err = document.getElementById('authError');
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)){ err.textContent='Usernames are 3-20 characters: letters, numbers, underscore.'; return; }
  if (!email.includes('@')){ err.textContent='Enter a valid email.'; return; }
  if (password.length < 6){ err.textContent='Password must be at least 6 characters.'; return; }
  if (password !== confirm){ err.textContent="Passwords don't match."; return; }
  err.textContent='Creating account…';
  const { data: taken } = await sb.from('profiles').select('id').eq('username', username).maybeSingle();
  if (taken){ err.textContent='That username is taken.'; return; }
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error){ err.textContent = error.message; return; }
  if (!data.session){
    const { error: e2 } = await sb.auth.signInWithPassword({ email, password });
    if (e2){ err.textContent = 'Account made, but email confirmation appears to be ON. Disable it in Supabase (Authentication → Providers → Email) and log in.'; return; }
  }
  const userId = data.user.id;
  const { error: pErr } = await sb.from('profiles').insert({ id:userId, username, name:username, color:randColor() });
  if (pErr && !String(pErr.message||'').includes('duplicate')){ err.textContent = 'Profile error: '+pErr.message; return; }
  const ok = await loadMe(userId);
  if (!ok){ err.textContent='Could not load your profile. Check your table setup.'; return; }
  await afterAuth();
}

async function submitLogin(){
  const email = (document.getElementById('authEmail').value||'').trim();
  const password = document.getElementById('authPassword').value||'';
  const err = document.getElementById('authError');
  if (!email || !password){ err.textContent='Enter your email and password.'; return; }
  err.textContent='Logging in…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error){ err.textContent='Invalid email or password.'; return; }
  const ok = await loadMe(data.user.id);
  if (!ok){ err.textContent='Logged in, but no profile found for this account.'; return; }
  await afterAuth();
}

function confirmLogout(){
  const o = document.createElement('div');
  o.className='modal-overlay';
  o.innerHTML = `<div class="modal-card"><h3>Log out?</h3>
    <p style="color:var(--text-dim);font-size:13px;margin:0 0 18px;">You'll need your email and password to sign back in.</p>
    <div class="modal-actions"><button class="secondary-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    <button class="primary-btn" onclick="doLogout()">Log out</button></div></div>`;
  document.body.appendChild(o);
  o.addEventListener('click', e => { if(e.target===o) o.remove(); });
}

async function doLogout(){
  clearPoll();
  if (state.heartbeatHandle){ clearInterval(state.heartbeatHandle); state.heartbeatHandle=null; }
  if (consolePoll){ clearInterval(consolePoll); consolePoll=null; }
  try{ await sb.auth.signOut(); }catch(e){}
  state.me=null; state.profileView=null;
  document.querySelectorAll('.modal-overlay,.console-overlay').forEach(o=>o.remove());
  renderAuth('login');
}

/* ================= Data loaders ================= */
async function loadDirectory(){
  const { data } = await sb.from('profiles').select('*');
  const dir = {};
  (data||[]).forEach(r => dir[r.id] = mapProfile(r));
  state.directory = dir;
  if (state.me && dir[state.me.id]) state.me = dir[state.me.id];
}
async function loadChannels(){
  const { data } = await sb.from('channels').select('*').order('created_at',{ascending:true});
  state.channels = (data||[]).map(c => ({ id:c.id, name:c.name, desc:c.description||'' }));
  if (!state.channels.some(c=>c.id===state.activeChannel) && state.channels[0]) state.activeChannel = state.channels[0].id;
}
async function loadThreads(){
  const { data } = await sb.from('threads').select('*').order('last_activity',{ascending:false});
  state.threads = (data||[]).map(t => ({ id:t.id, channelId:t.channel_id, title:t.title, authorId:t.author_id,
    createdAt:new Date(t.created_at).getTime(), lastActivity:new Date(t.last_activity).getTime(), replyCount:t.reply_count||0 }));
}
async function loadPosts(threadId){
  const { data } = await sb.from('posts').select('*').eq('thread_id', threadId).order('created_at',{ascending:true});
  state.posts = (data||[]).map(p => ({ id:p.id, authorId:p.author_id, text:p.body, createdAt:new Date(p.created_at).getTime() }));
}
async function loadChat(){
  const { data } = await sb.from('messages').select('*').order('created_at',{ascending:false}).limit(200);
  state.chat = (data||[]).reverse().map(m => ({ id:m.id, authorId:m.author_id, text:m.body, createdAt:new Date(m.created_at).getTime() }));
}
async function loadFollows(){
  const { data } = await sb.from('follows').select('*');
  const f = {}; (data||[]).forEach(r => { (f[r.target_id]=f[r.target_id]||[]).push(r.follower_id); });
  state.follows = f;
}
async function loadLikes(){
  const { data } = await sb.from('likes').select('*');
  const l = {}; (data||[]).forEach(r => { (l[r.target_id]=l[r.target_id]||[]).push(r.liker_id); });
  state.likes = l;
}

/* ================= After auth ================= */
async function afterAuth(){
  await loadDirectory();
  if (state.me.banned){ renderBanScreen(); return; }
  await loadChannels();
  await loadThreads();
  renderShell();
  heartbeat();
  if (state.heartbeatHandle) clearInterval(state.heartbeatHandle);
  state.heartbeatHandle = setInterval(heartbeat, 15000);
  setActiveTab('board');
}

/* ================= Shell / header ================= */
function renderShell(){
  app.innerHTML = `
    <div class="topbar">
      <div class="brand">${signalIcon(20)} FREQUENCY</div>
      <div class="tab-switch">
        <div id="tabIndicator" class="tab-indicator"></div>
        <button id="tabBoardBtn" class="tab active" onclick="setActiveTab('board')">BOARD</button>
        <button id="tabLiveBtn" class="tab" onclick="setActiveTab('live')">LIVE<span class="tab-pulse"></span></button>
        <button id="tabPeopleBtn" class="tab" onclick="setActiveTab('people')">PEOPLE</button>
      </div>
      <div class="who">
        <span class="online-count"><span class="dot"></span><span id="onlineCount">1</span> online</span>
        <button id="consoleBtn" class="console-btn" onclick="openConsole()" style="display:${isDeveloperUser(state.me.id)?'flex':'none'}">${shieldIcon(13)} CONSOLE</button>
        <button class="profile-pill" onclick="openProfile(state.me.id)">
          <span class="avatar" id="pillAvatar" style="background:${state.me.color}">${initials(state.me.name)}</span>

function setActiveTab(tab){
  state.tab = tab; state.profileView = null;
  document.getElementById('tabBoardBtn').classList.toggle('active', tab==='board');
  document.getElementById('tabLiveBtn').classList.toggle('active', tab==='live');
  document.getElementById('tabPeopleBtn').classList.toggle('active', tab==='people');
  document.getElementById('tabIndicator').className = 'tab-indicator' + (tab==='live'?' pos1':tab==='people'?' pos2':'');
  if (tab==='board'){ state.view='list'; renderBoard(); }
  else if (tab==='live'){ renderLive(); }
  else { renderPeople(); }
}

function openProfileEditor(){
  const o = document.createElement('div'); o.className='modal-overlay';
  o.innerHTML = `<div class="modal-card"><h3>Edit display name</h3>
    <input id="editNameInput" value="${esc(state.me.name)}" maxlength="24">
    <div class="modal-actions"><button class="secondary-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    <button class="primary-btn" onclick="saveProfileName()">Save</button></div></div>`;
  document.body.appendChild(o);
  o.addEventListener('click', e => { if(e.target===o) o.remove(); });
}
async function saveProfileName(){
  const val = (document.getElementById('editNameInput').value||'').trim();
  if (!val) return;
  await sb.from('profiles').update({ name: val }).eq('id', state.me.id);
  state.me.name = val; state.directory[state.me.id].name = val;
  document.querySelector('.modal-overlay').remove();
  renderShell();
  if (state.profileView) renderProfilePage();
  else if (state.tab==='board') renderBoard();
  else if (state.tab==='live') renderLive();
  else renderPeople();
}

/* ================= Heartbeat / presence ================= */
async function heartbeat(){
  if (!state.me) return;
  await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', state.me.id);
  await loadDirectory();
  if (state.me.banned){ renderBanScreen(); return; }
  const since = new Date(Date.now()-90000).toISOString();
  const { count } = await sb.from('profiles').select('id',{count:'exact',head:true}).gte('last_seen', since);
  const el = document.getElementById('onlineCount'); if (el) el.textContent = count||1;
  const pt = document.getElementById('pillRoleTags'); if (pt) pt.innerHTML = roleTags(state.me.id);
  const cb = document.getElementById('consoleBtn'); if (cb) cb.style.display = isDeveloperUser(state.me.id)?'flex':'none';
}

function renderBanScreen(){
  clearPoll();
  if (state.heartbeatHandle){ clearInterval(state.heartbeatHandle); state.heartbeatHandle=null; }
  document.querySelectorAll('.console-overlay,.modal-overlay').forEach(o=>o.remove());
  app.innerHTML = `<div class="onboard-wrap"><div class="onboard-card" style="text-align:center;">
    <div class="onboard-icon" style="color:var(--danger);display:flex;justify-content:center;">${shieldIcon(30)}</div>
    <h1>Account banned</h1><p>An admin has banned this account from Frequency.</p>
    <button class="primary-submit" onclick="doLogout()">Log out</button></div></div>`;
}

async function postingBlocked(){
  const { data } = await sb.from('profiles').select('banned,timeout_until').eq('id', state.me.id).maybeSingle();
  if (data && data.banned){ state.me.banned = true; renderBanScreen(); return true; }
  const tu = data && data.timeout_until ? new Date(data.timeout_until).getTime() : 0;
  if (tu && tu > Date.now()){ showNotice('You&rsquo;re timed out', `An admin paused your posting. It lifts in ${fmtRemaining(tu-Date.now())}.`); return true; }
  return false;
}
function showNotice(title, msg){
  const o = document.createElement('div'); o.className='modal-overlay';
  o.innerHTML = `<div class="modal-card"><h3>${title}</h3>
    <p style="color:var(--text-dim);font-size:13px;line-height:1.5;margin:0 0 18px;">${msg}</p>
    <div class="modal-actions"><button class="primary-btn" onclick="this.closest('.modal-overlay').remove()">OK</button></div></div>`;
  document.body.appendChild(o);
  o.addEventListener('click', e => { if(e.target===o) o.remove(); });
}

/* ================= Board ================= */
function renderBoard(){
  setPoll(async () => {
    if (state.view==='list'){ await loadThreads(); await loadDirectory(); renderBoardList(false); }
    else { await loadPosts(state.openThreadId); await loadDirectory(); renderThreadDetail(false); }
  }, state.view==='list'?8000:5000);
  if (state.view==='list') renderBoardList(true); else renderThreadDetail(true);
}

function renderBoardList(full){
  const main = document.getElementById('main');
  const channel = state.channels.find(c=>c.id===state.activeChannel) || state.channels[0] || {id:'',name:'',desc:''};
  const threads = state.threads.filter(t=>t.channelId===channel.id).sort((a,b)=>b.lastActivity-a.lastActivity);
  if (!full && document.getElementById('threadList')){ document.getElementById('threadList').innerHTML = threadListHtml(threads, channel); return; }
  main.innerHTML = `
    <div class="board-layout">
      <div class="channel-rail">
        <div class="rail-label">CHANNELS</div>
        ${state.channels.map(c=>`<button class="channel-item ${c.id===channel.id?'active':''}" onclick="selectChannel('${c.id}')">${esc(c.name)}${c.desc?`<span class="channel-desc">${esc(c.desc)}</span>`:''}</button>`).join('')}
        <button class="ghost-btn" onclick="state.showNewChannel=!state.showNewChannel; renderBoardList(true);">+ New channel</button>
        ${state.showNewChannel?`<div class="panel" style="margin-top:10px;">
          <input id="newChannelName" placeholder="Channel name"><input id="newChannelDesc" placeholder="One-line description (optional)">
          <div class="panel-actions"><button class="secondary-btn" onclick="state.showNewChannel=false; renderBoardList(true);">Cancel</button>
          <button class="primary-btn" onclick="submitNewChannel()">Create</button></div></div>`:''}
      </div>
      <div class="board-main">
        <div class="board-header"><div><h2>#${esc(channel.name)}</h2>${channel.desc?`<p>${esc(channel.desc)}</p>`:''}</div>
          <button class="primary-btn" onclick="state.showNewThread=!state.showNewThread; renderBoardList(true);">+ New thread</button></div>
        ${state.showNewThread?`<div class="panel"><input id="newThreadTitle" placeholder="Thread title">
          <textarea id="newThreadBody" rows="4" placeholder="Write the first post..."></textarea>
          <div class="panel-actions"><button class="secondary-btn" onclick="state.showNewThread=false; renderBoardList(true);">Cancel</button>
          <button class="primary-btn" onclick="submitNewThread('${channel.id}')">Post thread</button></div></div>`:''}
        <div id="threadList">${threadListHtml(threads, channel)}</div>
      </div>
    </div>`;
}
function threadListHtml(threads, channel){
  if (!threads.length) return `<div class="empty-state"><p>Nothing posted in #${esc(channel.name)} yet. Start the first thread.</p></div>`;
  return threads.map(t=>`<div class="thread-card" onclick="openThread('${t.id}')"><h3>${esc(t.title)}</h3>
    <div class="thread-meta">${authorLink(t.authorId,'event.stopPropagation();')}<span>${relTime(t.createdAt)}</span><span>${t.replyCount} repl${t.replyCount===1?'y':'ies'}</span></div></div>`).join('');
}
async function selectChannel(id){ state.activeChannel=id; state.showNewThread=false; state.showNewChannel=false; renderBoardList(true); }

async function submitNewChannel(){
  const name = (document.getElementById('newChannelName').value||'').trim();
  if (!name) return;
  if (await postingBlocked()) return;
  const desc = (document.getElementById('newChannelDesc').value||'').trim();
  let id = slugify(name);
  if (state.channels.some(c=>c.id===id)) id += '-'+Math.random().toString(36).slice(2,5);
  const { error } = await sb.from('channels').insert({ id, name, description:desc });
  if (error){ showNotice('Could not create channel', esc(error.message)); return; }
  state.showNewChannel=false; await loadChannels(); state.activeChannel=id; renderBoardList(true);
}

async function submitNewThread(channelId){
  const title = (document.getElementById('newThreadTitle').value||'').trim();
  const body = (document.getElementById('newThreadBody').value||'').trim();
  if (!title || !body) return;
  if (await postingBlocked()) return;
  const { data:thr, error } = await sb.from('threads').insert({ channel_id:channelId, title, author_id:state.me.id }).select().single();
  if (error){ showNotice('Could not post thread', esc(error.message)); return; }
  await sb.from('posts').insert({ thread_id:thr.id, author_id:state.me.id, body });
  state.showNewThread=false; await loadThreads(); openThread(thr.id);
}

async function openThread(id){ state.view='thread'; state.openThreadId=id; await loadPosts(id); await loadDirectory(); renderBoard(); }
function backToList(){ state.view='list'; renderBoard(); }

function renderThreadDetail(full){
  const thread = state.threads.find(t=>t.id===state.openThreadId);
  if (!thread){ backToList(); return; }
  const replies = state.posts.slice(1);
  if (!full && document.getElementById('repliesList')){
    document.getElementById('repliesList').innerHTML = repliesHtml(replies);
    document.getElementById('replyCountLabel').textContent = replies.length+(replies.length===1?' REPLY':' REPLIES'); return;
  }
  const ch = state.channels.find(c=>c.id===thread.channelId)||{name:''};
  document.getElementById('main').innerHTML = `
    <div class="board-main" style="max-width:760px;margin:0 auto;">
      <button class="back-link" onclick="backToList()">&larr; back to #${esc(ch.name)}</button>
      <h1 class="thread-title">${esc(thread.title)}</h1>
      ${state.posts[0]?postCardHtml(state.posts[0]):''}
      <div class="reply-count-label" id="replyCountLabel">${replies.length}${replies.length===1?' REPLY':' REPLIES'}</div>
      <div id="repliesList">${repliesHtml(replies)}</div>
      <div class="panel"><textarea id="replyText" rows="3" placeholder="Write a reply..."></textarea>
        <div class="panel-actions"><button class="primary-btn" onclick="submitReply('${thread.id}')">Reply</button></div></div>
    </div>`;
}
function postCardHtml(p){
  return `<div class="post-card"><div class="post-head">
    <span class="avatar" style="background:${colorOf(p.authorId)}">${initials(nameOf(p.authorId))}</span>
    ${authorLink(p.authorId)}<span class="post-time">${relTime(p.createdAt)}</span></div>
    <div class="post-body">${esc(p.text)}</div></div>`;
}
function repliesHtml(replies){ return replies.length?replies.map(postCardHtml).join(''):`<div class="empty-state"><p>No replies yet &mdash; be the first to respond.</p></div>`; }

async function submitReply(threadId){
  const el = document.getElementById('replyText'); const text=(el.value||'').trim();
  if (!text) return;
  if (await postingBlocked()) return;
  el.value='';
  await sb.from('posts').insert({ thread_id:threadId, author_id:state.me.id, body:text });
  await loadPosts(threadId); renderThreadDetail(true);
}

/* ================= Live chat ================= */
function renderLive(){
  setPoll(async () => { await loadChat(); await loadDirectory(); renderChatStream(false); }, 3000);
  loadChat().then(()=>renderChatLayout());
}
function renderChatLayout(){
  document.getElementById('main').innerHTML = `
    <div class="live-layout"><div id="chatStream" class="chat-stream"></div>
    <div class="chat-input-bar"><input id="chatInput" placeholder="Say something on the wire..." maxlength="500">
    <button onclick="submitChat()">SEND</button></div></div>`;
  document.getElementById('chatInput').addEventListener('keydown', e => { if(e.key==='Enter') submitChat(); });
  renderChatStream(true);
}
function renderChatStream(scrollEnd){
  const el = document.getElementById('chatStream'); if (!el) return;
  const near = el.scrollHeight-el.scrollTop-el.clientHeight < 80;
  if (!state.chat.length){ el.innerHTML = `<div class="empty-state"><p>The airwaves are quiet. Say something.</p></div>`; return; }
  el.innerHTML = state.chat.map(m=>`<div class="chat-msg">
    <span class="avatar" style="background:${colorOf(m.authorId)}">${initials(nameOf(m.authorId))}</span>
    <div><div class="chat-meta">${authorLink(m.authorId)}${relTime(m.createdAt)}</div>
    <div class="chat-text">${esc(m.text)}</div></div></div>`).join('');
  if (scrollEnd || near) el.scrollTop = el.scrollHeight;
}
async function submitChat(){
  const input = document.getElementById('chatInput'); const text=(input.value||'').trim();
  if (!text) return;
  if (await postingBlocked()) return;
  input.value='';
  await sb.from('messages').insert({ author_id:state.me.id, body:text });
  await loadChat(); renderChatStream(true);
}

/* ================= People ================= */
function renderPeople(){
  setPoll(async ()=>{ await loadDirectory(); await loadFollows(); renderPeopleList(); }, 15000);
  Promise.all([loadDirectory(), loadFollows()]).then(renderPeopleList);
}
function renderPeopleList(){
  const people = Object.values(state.directory);
  const others = people.filter(p=>p.id!==state.me.id)
    .sort((a,b)=>(state.follows[b.id]||[]).length-(state.follows[a.id]||[]).length || a.name.localeCompare(b.name));
  document.getElementById('main').innerHTML = `
    <div class="people-page">
      <div class="board-header"><div><h2>People</h2><p>Everyone with a Frequency account.</p></div></div>
      <div class="people-row" onclick="openProfile('${state.me.id}')">
        <span class="avatar" style="background:${state.me.color}">${initials(state.me.name)}</span>
        <div class="meta"><div class="pname">${esc(state.me.name)}${roleTags(state.me.id)} <span style="color:var(--text-dim);font-weight:400;">(you)</span></div>
        <div class="pfollowers">${(state.follows[state.me.id]||[]).length} followers</div></div></div>
      ${others.length?others.map(p=>`<div class="people-row" onclick="openProfile('${p.id}')">
        <span class="avatar" style="background:${p.color}">${initials(p.name)}</span>
        <div class="meta"><div class="pname">${esc(p.name)}${roleTags(p.id)}</div>
        <div class="pfollowers">${(state.follows[p.id]||[]).length} followers</div></div></div>`).join('')
        :`<div class="empty-state"><p>No one else has joined yet. Share the link to invite people.</p></div>`}
    </div>`;
}

/* ================= Profile ================= */
async function openProfile(userId){
  state.profileView = userId;
  await Promise.all([loadDirectory(), loadFollows(), loadLikes(), loadThreads()]);
  setPoll(async ()=>{ await Promise.all([loadDirectory(), loadFollows(), loadLikes()]); if (state.profileView===userId) renderProfilePage(); }, 10000);
  renderProfilePage();
}
function backFromProfile(){
  state.profileView=null;
  if (state.tab==='board') renderBoard(); else if (state.tab==='live') renderLive(); else renderPeople();
}
async function goToThreadFromProfile(threadId){ setActiveTab('board'); await openThread(threadId); }

function renderProfilePage(){
  const userId = state.profileView;
  const person = state.directory[userId] || {id:userId,name:'Unknown',color:'#888',joinedAt:Date.now(),roles:[]};
  const isMe = userId===state.me.id;
  const followerIds = state.follows[userId]||[];
  const followingCount = Object.values(state.follows).filter(a=>a.includes(userId)).length;
  const likerIds = state.likes[userId]||[];
  const isFollowing = followerIds.includes(state.me.id);
  const isLiked = likerIds.includes(state.me.id);
  const threadsByUser = state.threads.filter(t=>t.authorId===userId).sort((a,b)=>b.lastActivity-a.lastActivity);
  document.getElementById('main').innerHTML = `
    <div class="profile-page">
      <button class="back-link" onclick="backFromProfile()">&larr; back</button>
      <div class="profile-top"><div class="avatar-lg" style="background:${person.color}">${initials(person.name)}</div>
        <div><h2 class="profile-name">${esc(person.name)}${roleTags(userId,true)}</h2>
        ${person.username?`<div class="profile-handle">@${esc(person.username)}</div>`:''}
        <div class="profile-joined">Joined ${fmtDate(person.joinedAt)}</div></div></div>
      <div class="profile-stats">
        <div><b>${followerIds.length}</b>followers</div><div><b>${followingCount}</b>following</div>
        <div><b>${likerIds.length}</b>likes</div><div><b>${threadsByUser.length}</b>threads</div></div>
      <div class="profile-actions">
        ${isMe?`<span class="you-badge">This is you</span>
          <button class="secondary-btn" onclick="openProfileEditor()">Edit name</button>
          <button class="secondary-btn" onclick="confirmLogout()">Log out</button>`
        :`<button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow('${userId}')">${isFollowing?'Following':'Follow'}</button>
          <button class="like-btn ${isLiked?'liked':''}" onclick="toggleLike('${userId}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M12 21C12 21 4 14.5 4 9.5C4 6.5 6.5 4 9.5 4C11 4 12 5 12 5C12 5 13 4 14.5 4C17.5 4 20 6.5 20 9.5C20 14.5 12 21 12 21Z"/></svg> ${likerIds.length}</button>`}
      </div>
      <div class="reply-count-label">THREADS STARTED</div>
      ${threadsByUser.length?threadsByUser.map(t=>`<div class="thread-card" onclick="goToThreadFromProfile('${t.id}')">
        <h3>${esc(t.title)}</h3><div class="thread-meta"><span>${relTime(t.createdAt)}</span><span>${t.replyCount} repl${t.replyCount===1?'y':'ies'}</span></div></div>`).join('')
        :`<div class="empty-state"><p>${isMe?"You haven't":esc(person.name)+" hasn't"} started a thread yet.</p></div>`}
    </div>`;
}

async function toggleFollow(targetId){
  if (targetId===state.me.id) return;
  const following = (state.follows[targetId]||[]).includes(state.me.id);
  if (following) await sb.from('follows').delete().eq('follower_id',state.me.id).eq('target_id',targetId);
  else await sb.from('follows').insert({ follower_id:state.me.id, target_id:targetId });
  await loadFollows(); renderProfilePage();
}
async function toggleLike(targetId){
  if (targetId===state.me.id) return;
  const liked = (state.likes[targetId]||[]).includes(state.me.id);
  if (liked) await sb.from('likes').delete().eq('liker_id',state.me.id).eq('target_id',targetId);
  else await sb.from('likes').insert({ liker_id:state.me.id, target_id:targetId });
  await loadLikes(); renderProfilePage();
}

/* ================= Admin console ================= */
const TIMEOUT_OPTIONS = [ {mins:5,label:'5m'}, {mins:60,label:'1h'}, {mins:1440,label:'24h'} ];
async function openConsole(){
  if (!isDeveloperUser(state.me.id)) return;
  await loadDirectory();
  if (!document.querySelector('.console-overlay')){
    const o = document.createElement('div'); o.className='console-overlay'; o.id='consoleOverlay';
    o.addEventListener('click', e=>{ if(e.target===o) closeConsole(); });
    document.body.appendChild(o);
  }
  renderConsole();
  if (consolePoll) clearInterval(consolePoll);
  consolePoll = setInterval(async ()=>{
    if (!document.querySelector('.console-overlay')){ clearInterval(consolePoll); consolePoll=null; return; }
    await loadDirectory(); renderConsole(true);
  }, 8000);
}
function closeConsole(){ if (consolePoll){ clearInterval(consolePoll); consolePoll=null; } const o=document.querySelector('.console-overlay'); if(o) o.remove(); }

function renderConsole(preserve){
  const overlay = document.querySelector('.console-overlay'); if (!overlay) return;
  const prev = preserve ? (document.getElementById('consoleSearch')?.value||'') : '';
  const q = prev.trim().toLowerCase();
  const users = Object.values(state.directory)
    .filter(u=>!q || (u.name||'').toLowerCase().includes(q) || (u.username||'').toLowerCase().includes(q))
    .sort((a,b)=>{ const rank=u=>u.roles.includes('developer')?0:u.roles.includes('admin')?1:2; return rank(a)-rank(b) || (a.name||'').localeCompare(b.name||''); });
  overlay.innerHTML = `<div class="console-card">
    <div class="console-head"><h2>${shieldIcon(20)} Admin console</h2>
      <button class="console-close" onclick="closeConsole()" aria-label="Close">&times;</button></div>
    <div class="console-body">
      <input id="consoleSearch" class="console-search" placeholder="Search people by name or @username" value="${esc(prev)}" oninput="renderConsole(true)">
      ${users.map(userRowHtml).join('') || '<div class="empty-state"><p>No people match that search.</p></div>'}
    </div></div>`;
  if (preserve){ const s=document.getElementById('consoleSearch'); if(s){ s.focus(); s.setSelectionRange(s.value.length,s.value.length); } }
}
function userRowHtml(u){
  const isMe = u.id===state.me.id;
  const banned = !!u.banned;
  const remaining = (u.timeoutUntil && u.timeoutUntil>Date.now()) ? (u.timeoutUntil-Date.now()) : 0;
  const status = banned?`<span class="user-status banned">BANNED</span>`
    : remaining?`<span class="user-status timed">TIMED OUT &middot; ${fmtRemaining(remaining)} left</span>`
    : `<span class="user-status active">ACTIVE</span>`;
  const roleChips = ROLE_DEFS.map(r=>{
    const on = u.roles.includes(r.id); const lock = isMe && r.id==='developer';
    const chipKind = r.id==='admin'?'role-admin-chip':r.id==='developer'?'role-dev-chip':'';
    return `<button class="chip ${on?'on':''} ${chipKind} ${lock?'disabled':''}" ${lock?'title="You can&apos;t remove your own developer role"':`onclick="toggleRole('${u.id}','${r.id}')"`}>${r.label}</button>`;
  }).join('');
  let mod;
  if (isMe){ mod = `<div class="self-note">Moderation actions are disabled on your own account.</div>`; }
  else {
    const tchips = remaining
      ? `<button class="chip" onclick="clearUserTimeout('${u.id}')">Remove timeout</button>`
      : TIMEOUT_OPTIONS.map(o=>`<button class="chip" onclick="timeoutUser('${u.id}',${o.mins})">Timeout ${o.label}</button>`).join('');
    mod = `<div class="ctl-label">TIMEOUT</div><div class="ctl-row">${tchips}</div>
      <div class="ctl-label">ACCESS</div><div class="ctl-row">
      ${banned?`<button class="chip" onclick="setBan('${u.id}',false)">Unban</button>`:`<button class="chip danger" onclick="setBan('${u.id}',true)">Ban</button>`}</div>`;
  }
  return `<div class="user-row ${banned?'is-banned':''}"><div class="user-row-top">
    <span class="avatar" style="background:${u.color}">${initials(u.name)}</span>
    <span class="uname">${esc(u.name)}${u.username?` <span style="color:var(--text-dim);font-weight:400;font-family:var(--font-mono);font-size:11px;">@${esc(u.username)}</span>`:''}${isMe?' <span style="color:var(--text-dim);font-weight:400;">(you)</span>':''}</span>
    ${status}</div>
    <div class="ctl-label">IDENTITY</div><div class="ctl-row"><button class="chip" onclick="editUserIdentity('${u.id}')">Edit username &amp; name</button></div>
    <div class="ctl-label">ROLES</div><div class="ctl-row">${roleChips}</div>${mod}</div>`;
}

function editUserIdentity(userId){
  if (!isDeveloperUser(state.me.id)) return;
  const u = state.directory[userId]; if (!u) return;
  const o = document.createElement('div'); o.className='modal-overlay';
  o.innerHTML = `<div class="modal-card"><h3>Edit identity</h3>
    <div class="ctl-label" style="margin-top:0;">USERNAME (the @handle they signed up with)</div>
    <input id="idUsername" value="${esc(u.username||'')}" maxlength="20" autocomplete="off">
    <div class="ctl-label">DISPLAY NAME</div>
    <input id="idName" value="${esc(u.name||'')}" maxlength="24" autocomplete="off">
    <div id="idError" class="auth-error" style="margin:-2px 0 10px;"></div>
    <div class="modal-actions">
      <button class="secondary-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="primary-btn" onclick="saveUserIdentity('${userId}')">Save</button>
    </div></div>`;
  document.body.appendChild(o);
  o.addEventListener('click', e => { if (e.target===o) o.remove(); });
  document.getElementById('idUsername').focus();
}

async function saveUserIdentity(userId){
  const uname = (document.getElementById('idUsername').value||'').trim();
  const dname = (document.getElementById('idName').value||'').trim();
  const err = document.getElementById('idError');
  if (uname.length < 1 || uname.length > 20){ err.textContent='Usernames must be 1-20 characters.'; return; }
  if (!dname){ err.textContent='Display name cannot be empty.'; return; }
  err.textContent='Saving…';
  const { data: taken } = await sb.from('profiles').select('id').eq('username', uname).neq('id', userId).maybeSingle();
  if (taken){ err.textContent='That username is taken.'; return; }
  const { error } = await sb.from('profiles').update({ username: uname, name: dname }).eq('id', userId);
  if (error){ err.textContent = String(error.message||'').includes('duplicate') ? 'That username is taken.' : error.message; return; }
  if (userId===state.me.id){
    state.me.username = uname; state.me.name = dname;
    const pn=document.getElementById('pillName'); if (pn) pn.textContent = dname;
    const pa=document.getElementById('pillAvatar'); if (pa) pa.textContent = initials(dname);
  }
  document.querySelector('.modal-overlay').remove();
  await afterConsoleMutation();
}

async function toggleRole(userId, roleId){
  if (userId===state.me.id && roleId==='developer') return;
  const u = state.directory[userId]; if (!u) return;
  const roles = u.roles.slice();
  const i = roles.indexOf(roleId); if (i===-1) roles.push(roleId); else roles.splice(i,1);
  const { error } = await sb.from('profiles').update({ roles }).eq('id', userId);
  if (error){ showNotice('Action failed', esc(error.message)); return; }
  await afterConsoleMutation();
}
async function setBan(userId, banned){
  if (userId===state.me.id) return;
  const { error } = await sb.from('profiles').update({ banned }).eq('id', userId);
  if (error){ showNotice('Action failed', esc(error.message)); return; }
  await afterConsoleMutation();
}
async function timeoutUser(userId, minutes){
  if (userId===state.me.id) return;
  const { error } = await sb.from('profiles').update({ timeout_until: new Date(Date.now()+minutes*60000).toISOString() }).eq('id', userId);
  if (error){ showNotice('Action failed', esc(error.message)); return; }
  await afterConsoleMutation();
}
async function clearUserTimeout(userId){
  const { error } = await sb.from('profiles').update({ timeout_until: null }).eq('id', userId);
  if (error){ showNotice('Action failed', esc(error.message)); return; }
  await afterConsoleMutation();
}
async function afterConsoleMutation(){
  await loadDirectory(); renderConsole(true);
  const pt = document.getElementById('pillRoleTags'); if (pt) pt.innerHTML = roleTags(state.me.id);
  const cb = document.getElementById('consoleBtn'); if (cb) cb.style.display = isDeveloperUser(state.me.id)?'flex':'none';
}

/* ================= Go ================= */
boot();
</script>
</body>
</html>
